spring:
  datasource:
    url: jdbc:h2:mem:ticket_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  
  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: false   # 테스트는 H2 + create-drop으로 스키마 관리

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    org.hibernate.SQL: debug
