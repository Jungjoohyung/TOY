spring:
  profiles:
    active: local
  
  datasource:
    # 도커 MySQL 포트(3306)와 아까 만든 DB이름(ticket)으로 통일!
    url: jdbc:mysql://localhost:3306/ticket_service?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway가 스키마를 관리하므로 validate로 변경
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        use_sql_comments: true
    show-sql: true
    open-in-view: false
  
  # 레디스 설정도 살려둠 (도커에 redis도 떠있다면 정상 작동함)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.type: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
    org.springframework.data.redis: DEBUG

# 대기열 & 예약 설정
queue:
  batch-size: 50          # 스케줄러 1회 실행 시 활성화할 최대 인원 수
  active-ttl-minutes: 5   # Active 토큰 유효 시간 (분)

reservation:
  payment-deadline-minutes: 5   # 미결제 예약 자동 취소 기준 시간 (분)