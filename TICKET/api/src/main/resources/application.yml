spring:
  profiles:
    active: local

  cache:
    type: redis
    cache-names: performances, seats
  
  datasource:
    # 도커 MySQL 포트(3306)와 아까 만든 DB이름(ticket)으로 통일!
    url: jdbc:mysql://localhost:3306/ticket_service?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway가 스키마를 관리하므로 validate로 변경
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        use_sql_comments: true
    show-sql: true
    open-in-view: false
  
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all           # 모든 레플리카 확인 후 응답 (데이터 손실 방지)
      retries: 3
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false  # 수동 오프셋 커밋 (메시지 처리 후 커밋)
    listener:
      ack-mode: batch

  # 레디스 설정도 살려둠 (도커에 redis도 떠있다면 정상 작동함)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.type: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
    org.springframework.data.redis: INFO

# 대기열 & 예약 설정
queue:
  batch-size: 200         # 스케줄러 1회 실행 시 활성화할 최대 인원 수
  active-ttl-minutes: 5   # Active 토큰 유효 시간 (분)

reservation:
  payment-deadline-minutes: 5   # 미결제 예약 자동 취소 기준 시간 (분)

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ticket-service
    distribution:
      percentiles-histogram:
        http.server.requests: true   # p50/p95/p99 히스토그램